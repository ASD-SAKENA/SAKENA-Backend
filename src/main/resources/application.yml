spring:
  application:
    name: sakena

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sakena}
    username: ${DB_USERNAME:sakena}
    password: ${DB_PASSWORD:sakena}
    hikari:
      pool-name: sakena-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only validates that entities match it.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:sakena.team@gmail.com}
    password: ${MAIL_PASSWORD:qmxsngzapfukfmql}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
#  qmxs ngza pfuk fmql
server:
  port: ${SERVER_PORT:8080}

# Actuator: expose only what we need. Useful now, and the health probes are
# ready for Kubernetes liveness/readiness later.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.sakena: ${LOG_LEVEL_APP:DEBUG}

jwt:
  secret: ${JWT_SECRET:ipp3tok924jIS0d2q7PklWf6HwvPoUjIGsFU2a9kvMs=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  reset-token-expiration-minutes: ${APP_RESET_TOKEN_EXPIRATION_MINUTES:60}
