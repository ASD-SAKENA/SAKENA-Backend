spring:
  application:
    name: sakena

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sakena}
    username: ${DB_USERNAME:sakena}
    password: ${DB_PASSWORD:sakena}
    hikari:
      pool-name: sakena-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only validates that entities match it.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

# Actuator: expose only what we need. Useful now, and the health probes are
# ready for Kubernetes liveness/readiness later.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.sakena: ${LOG_LEVEL_APP:DEBUG}
